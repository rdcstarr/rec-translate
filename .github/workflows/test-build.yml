name: Test build (ad-hoc)

# Produces a RUNNABLE, ad-hoc-signed app for local testing — no Apple account / secrets needed.
# Download the artifact, unzip on your Mac, then first launch = right-click → Open (Gatekeeper),
# or run: xattr -dr com.apple.quarantine RecTranslate.app
# NOTE: ad-hoc builds are for testing only — they are NOT notarized and have NO working auto-update.
on:
  workflow_dispatch:

jobs:
  test-build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Bundle .app
        run: ./Scripts/bundle.sh "0.0.0-test" "${{ github.run_number }}"

      - name: Ad-hoc sign (local testing only)
        run: codesign --force --deep --sign - build/RecTranslate.app

      - name: Zip (preserve symlinks for the embedded framework)
        run: cd build && zip -r -y RecTranslate-test.zip RecTranslate.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RecTranslate-test-app
          path: build/RecTranslate-test.zip
          if-no-files-found: error
